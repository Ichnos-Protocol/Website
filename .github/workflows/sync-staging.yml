# Sync main → staging — manually triggered to promote main to staging.
#
# Purpose:
#   Force-pushes `main` to `staging` so that `staging` is always an exact copy
#   of `main` with no divergent history.
#
# Why manual (workflow_dispatch) instead of automatic:
#   Previously triggered by repository_dispatch alongside E2E tests. This caused
#   a cascade: merge to main → Vercel deploys → dispatch fires sync + E2E →
#   sync pushes to staging → Vercel deploys staging → new dispatch fires →
#   second E2E run cancels the first (concurrency group). Making sync manual
#   prevents this cascade and lets E2E runs complete uninterrupted.
#
# Why SYNC_PAT instead of GITHUB_TOKEN:
#   Pushes made with the default GITHUB_TOKEN do not trigger Vercel's native
#   git integration. Using a Personal Access Token (SYNC_PAT) lets the force-
#   push appear under a real user identity. Historically that alone was enough
#   to trigger Vercel — but after the Ichnos-Protocol team migration Vercel's
#   webhook filter started silently rejecting these PAT-driven force-pushes
#   too (direct user pushes from a terminal still trigger builds; PAT-driven
#   pushes from CI do not). To guarantee Vercel deploys the new staging tip,
#   we curl the project Deploy Hooks after the push. The hooks are direct API
#   triggers that bypass webhook routing entirely.
#
# Required secrets:
#   - SYNC_PAT: PAT with Contents + Workflows write on Ichnos-Protocol/Website
#   - VERCEL_DEPLOY_HOOK_STAGING_CLIENT: Deploy Hook URL for client project
#     (Vercel → ichnos-protocol → Settings → Git → Deploy Hooks, branch=staging)
#   - VERCEL_DEPLOY_HOOK_STAGING_SERVER: Deploy Hook URL for server project
#     (Vercel → ichnos-protocol_server → Settings → Git → Deploy Hooks, branch=staging)
name: Sync main → staging

on:
  workflow_dispatch:

permissions:
  contents: read

# Prevent concurrent pushes from conflicting on the staging branch.
# If a new deployment arrives while a sync is in progress, cancel the old one.
concurrency:
  group: sync-staging
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync main → staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (full clone with SYNC_PAT)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Force-push main to staging
        run: |
          echo "Force-pushing main to staging..."
          git push origin main:staging --force

      - name: Trigger Vercel client staging build via Deploy Hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_STAGING_CLIENT }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_STAGING_CLIENT secret is empty"
            exit 1
          fi
          echo "Triggering client staging deploy hook..."
          HTTP_CODE=$(curl -s -o /tmp/client-deploy.json -w "%{http_code}" -X POST "$DEPLOY_HOOK_URL")
          echo "Deploy hook responded with HTTP $HTTP_CODE"
          cat /tmp/client-deploy.json | head -1
          test "$HTTP_CODE" = "201" || test "$HTTP_CODE" = "200"

      - name: Trigger Vercel server staging build via Deploy Hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_STAGING_SERVER }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_STAGING_SERVER secret is empty"
            exit 1
          fi
          echo "Triggering server staging deploy hook..."
          HTTP_CODE=$(curl -s -o /tmp/server-deploy.json -w "%{http_code}" -X POST "$DEPLOY_HOOK_URL")
          echo "Deploy hook responded with HTTP $HTTP_CODE"
          cat /tmp/server-deploy.json | head -1
          test "$HTTP_CODE" = "201" || test "$HTTP_CODE" = "200"
